<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Integration Manager</title>
    <style>
        :root {
            --primary: #25D366;
            --primary-hover: #128C7E;
            --accent: #3b82f6;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --info: #3b82f6;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(to right, #25D366, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .button {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            margin: 20px 0;
        }

        .button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #475569;
            box-shadow: none;
        }

        .qr-container {
            text-align: center;
            margin: 30px 0;
            padding: 30px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }

        .status {
            padding: 14px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            border: 1px solid transparent;
        }

        .status.success { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.2); }
        .status.error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }
        .status.info { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-color: rgba(59, 130, 246, 0.2); }

        .qr-text {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            word-break: break-all;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: #818cf8;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log::-webkit-scrollbar { width: 6px; }
        .log::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }

        .copy-button {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .copy-button:hover { background: rgba(59, 130, 246, 0.3); }

        #qr-img {
            max-width: 220px;
            border: 10px solid white;
            border-radius: 12px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .label-info {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .integration-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 16px;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>

</head>
<body>
    <div class="container">
        <h1>WhatsApp Integration Manager</h1>
        
        <div id="status" class="status info">
            Conectando ao servidor...
        </div>

        <button id="createIntegration" class="button" disabled>
            Criar Nova Integração
        </button>

        <div id="qr-image" class="qr-container" style="display: none;">
            <h3>Escaneie o QR Code</h3>
            <p class="label-info">Abra o WhatsApp no seu celular > Configurações > Dispositivos Conectados > Conectar um dispositivo.</p>
            <div id="qrImageWrapper" style="margin: 30px 0;">
                <img id="qr-img" src="" alt="QR Code" style="display: none;">
                <div id="qr-loading" style="padding: 40px;">
                    <span style="display: block; margin-bottom: 15px;">Gerando QR Code...</span>
                    <!-- Spinner minimalista -->
                    <div class="spinner" style="width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                </div>
            </div>
            <div id="qrText" class="qr-text" style="display: none;"></div>
            <button id="copyQR" class="copy-button">Copiar Código Base64</button>
        </div>

        <style>
            @keyframes spin { to { transform: rotate(360deg); } }
        </style>


        <div id="integrationInfo" style="display: none;">
            <h3>Informações da Integração</h3>
            <p><strong>UUID:</strong> <span id="integrationUUID"></span></p>
            <p><strong>Status:</strong> <span id="integrationStatus"></span></p>
        </div>

        <h3>Log de Eventos</h3>
        <div id="log" class="log"></div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    
    <script>
        // Verifica se Socket.IO foi carregado
        if (typeof io === 'undefined') {
            alert('Erro: Socket.IO não foi carregado!');
        }

        const socket = io('http://localhost:3030');
        let currentIntegration = null;
        let isWaiting = false;

        /**
         * Implementação solicitada pelo usuário para exibir o QR Code
         */
        function showQr(qrData) {
            if (!isWaiting) return;
            
            // Chama a API externa passando a string do QR Code codificada na URL
            const url = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(qrData)}&t=${Date.now()}`;
            
            // Coloca a imagem gerada no elemento <img> do HTML
            document.getElementById('qr-img').src = url;
            
            // Esconde o loading e mostra a imagem
            document.getElementById('qr-loading').style.display = 'none';
            document.getElementById('qr-image').style.display = 'block';
            document.getElementById('qr-img').style.display = 'block'; // Garante que a imagem está visível
        }


        // Elementos do DOM
        const statusEl = document.getElementById('status');
        const createBtn = document.getElementById('createIntegration');
        const qrImageWrapper = document.getElementById('qr-image');
        const qrImg = document.getElementById('qr-img');
        const qrLoading = document.getElementById('qr-loading');
        const qrTextEl = document.getElementById('qrText');
        const copyQRBtn = document.getElementById('copyQR');
        const integrationInfo = document.getElementById('integrationInfo');
        const integrationUUID = document.getElementById('integrationUUID');
        const integrationStatus = document.getElementById('integrationStatus');
        const logEl = document.getElementById('log');


        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logEl.innerHTML += `[${timestamp}] ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function updateStatus(message, type = 'info') {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        // Função para copiar texto para clipboard
        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    log('QR code copiado para clipboard');
                    updateStatus('QR code copiado!', 'success');
                }).catch(err => {
                    log(`Erro ao copiar: ${err}`);
                    updateStatus('Erro ao copiar QR code', 'error');
                });
            } else {
                // Fallback para navegadores antigos
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    log('QR code copiado para clipboard (método antigo)');
                    updateStatus('QR code copiado!', 'success');
                } catch (err) {
                    log(`Erro ao copiar: ${err}`);
                    updateStatus('Erro ao copiar QR code', 'error');
                }
                document.body.removeChild(textArea);
            }
        }

        // Eventos do Socket.IO
        socket.on('connect', () => {
            updateStatus('Conectado ao servidor', 'success');
            createBtn.disabled = false;
            log('Conectado ao servidor WebSocket');
        });

        socket.on('disconnect', () => {
            updateStatus('Desconectado do servidor', 'error');
            createBtn.disabled = true;
            log('Desconectado do servidor WebSocket');
        });

        socket.on('integration-created', (data) => {
            currentIntegration = data;
            isWaiting = true; // Define como esperando ao criar a integração
            integrationUUID.textContent = data.uuid;
            integrationStatus.textContent = data.status;
            integrationInfo.style.display = 'block';
            
            updateStatus('Integração criada! Aguardando QR code...', 'info');
            log(`Integração criada: ${data.uuid}`);
        });

        socket.on('qr-code', (data) => {
            // Utiliza a função showQr implementada
            showQr(data.qr);
            
            qrTextEl.textContent = data.qr; // Mantém o texto para cópia se necessário
            log(`QR code recebido/atualizado.`);
            updateStatus('QR Code pronto para ler!', 'success');
        });


        socket.on('connection-status', (data) => {
            log(`Status da conexão para ${data.uuid}: ${data.status}`);
            integrationStatus.textContent = data.status;
            
            if (data.status === 'open') {
                isWaiting = false; // Parar de esperar após sucesso
                qrImageWrapper.style.display = 'none';
                updateStatus('Conectado com sucesso!', 'success');
                log('WhatsApp conectado!');
            } else if (data.status === 'connecting') {
                updateStatus('Tentando reconectar...', 'info');
            } else if (data.status === 'close') {
                isWaiting = false;
                updateStatus('Conexão fechada', 'error');
            }
        });


        socket.on('error', (data) => {
            updateStatus(`Erro: ${data.message}`, 'error');
            log(`Erro: ${data.message}`);
        });

        // Evento do botão criar integração
        createBtn.addEventListener('click', () => {
            log('Solicitando criação de nova integração...');
            socket.emit('integration-create');
            createBtn.disabled = true;
            updateStatus('Criando integração...', 'info');
        });

        // Evento do botão copiar QR code
        copyQRBtn.addEventListener('click', () => {
            const qrText = qrTextEl.textContent;
            if (qrText) {
                copyToClipboard(qrText);
            }
        });

        // Log inicial
        log('Interface carregada');
        log(`Socket.IO disponível: ${typeof io !== 'undefined'}`);
    </script>
</body>
</html>
